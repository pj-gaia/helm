# Default values for ..
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

global:
  image:
    registry: ghcr.io
  idp:
    enabled: false
    # -- The name of the IDP provider.
    name: keycloak
    # -- The client id of the application.
    clientId: ""
    # -- The client secret of the application.
    clientSecret: ""
    # -- The issuer url of the IDP.
    issuerUrl: ""

postgresql:
  enabled: true
  auth:
    username: keycloak
    password: password
    database: keycloak

registry:
  enabled: true
